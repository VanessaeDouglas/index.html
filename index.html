<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Parabéns Douglas!</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: radial-gradient(circle, #1a1a1a, #000); /* Fundo degradê escuro */
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        /* Efeito de brilho pulsante no título */
        h1 {
            font-size: 3.5rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 25px;
            text-shadow: 0 0 10px #fff, 0 0 20px #ff00de, 0 0 40px #ff00de;
            animation: pulse 1.5s infinite alternate;
            text-align: center;
        }

        @keyframes pulse {
            from { transform: scale(1); opacity: 0.9; }
            to { transform: scale(1.1); opacity: 1; }
        }

        /* Moldura com cores giratórias (Efeito Neon) */
        .foto-container {
            position: relative;
            padding: 12px;
            background: linear-gradient(45deg, #ff00de, #fffb00, #00ffea, #ff00de);
            background-size: 400% 400%;
            border-radius: 20px;
            animation: gradient-move 5s ease infinite;
            box-shadow: 0 0 30px rgba(255, 0, 222, 0.5);
        }

        @keyframes gradient-move {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .foto-container img {
            display: block;
            width: 380px; /* Tamanho da imagem da estrela */
            border-radius: 15px;
            filter: brightness(1.1);
        }

        .mensagem {
            margin-top: 30px;
            font-size: 1.4rem;
            color: #fffb00;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <h1>Parabéns Douglas!</h1>

    <div class="foto-container">
        <img src="images" alt="Estrela do Douglas">
    </div>

    <p class="mensagem">O Analista Administrativo mais brabo do Hospital!</p>

</body>
</html>
