<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Auditoria Administrativa</title>
    <style>
        :root {
            --primary: #2c3e50;
            --success: #27ae60;
            --danger: #e74c3c;
            --light: #ecf0f1;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--light);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 400px;
        }

        h2 { color: var(--primary); text-align: center; margin-bottom: 25px; }

        .input-group { margin-bottom: 15px; }

        label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; }

        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover { background-color: #34495e; }

        #resultado {
            margin-top: 20px;
            padding: 15px;
            border-radius: 6px;
            display: none;
            text-align: center;
            font-weight: bold;
        }

        .erro { background-color: #fadbd8; color: var(--danger); border: 1px solid var(--danger); }
        .sucesso { background-color: #d4efdf; color: var(--success); border: 1px solid var(--success); }
    </style>
</head>
<body>

<div class="container">
    <h2>Auditoria de Documentos</h2>
    
    <div class="input-group">
        <label>CNPJ do Fornecedor (NF)</label>
        <input type="text" id="cnpj" placeholder="00.000.000/0000-00">
    </div>

    <div class="input-group">
        <label>Valor da Ordem de Compra (R$)</label>
        <input type="number" id="valorOC" step="0.01" placeholder="0.00">
    </div>

    <div class="input-group">
        <label>Valor da Nota Fiscal (R$)</label>
        <input type="number" id="valorNF" step="0.01" placeholder="0.00">
    </div>

    <button onclick="validar()">CONFERIR DOCUMENTOS</button>

    <div id="resultado"></div>
</div>

<script>
    function validar() {
        const cnpj = document.getElementById('cnpj').value;
        const vOC = parseFloat(document.getElementById('valorOC').value);
        const vNF = parseFloat(document.getElementById('valorNF').value);
        const resDiv = document.getElementById('resultado');

        resDiv.style.display = "block";

        // Lógica de Auditoria Avançada
        if (vOC === vNF) {
            resDiv.innerHTML = "NÃO HÁ PROBLEMAS<br><small>Valores em conformidade absoluta.</small>";
            resDiv.className = "sucesso";
        } else {
            const dif = Math.abs(vOC - vNF).toFixed(2);
            resDiv.innerHTML = `SIM HÁ PROBLEMAS<br><small>Divergência de R$ ${dif} detectada.</small>`;
            resDiv.className = "erro";
        }
    }
</script>

</body>
</html>
