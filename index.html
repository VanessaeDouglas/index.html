<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Parabéns Douglas! 🎉</title>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: linear-gradient(135deg, #1a0533 0%, #3b0764 40%, #1a0533 100%);
      font-family: 'Nunito', sans-serif;
      overflow: hidden; position: relative;
    }

    .confetti-wrap { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    .confetti {
      position: absolute; width: 10px; height: 14px;
      border-radius: 2px; opacity: 0; animation: fall linear infinite;
    }
    @keyframes fall {
      0%   { transform: translateY(-20px) rotate(0deg);   opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0.3; }
    }

    .stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    .star {
      position: absolute; width: 4px; height: 4px;
      background: #fff; border-radius: 50%;
      animation: twinkle ease-in-out infinite alternate;
    }
    @keyframes twinkle {
      from { opacity: 0.2; transform: scale(0.8); }
      to   { opacity: 1;   transform: scale(1.4); }
    }

    .card {
      position: relative; z-index: 10;
      background: rgba(255,255,255,0.07);
      backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
      border: 1px solid rgba(255,255,255,0.18); border-radius: 32px;
      padding: 48px 56px; text-align: center;
      max-width: 480px; width: 90%;
      box-shadow: 0 8px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.06);
      animation: popIn 0.8s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes popIn {
      from { opacity: 0; transform: scale(0.7) translateY(40px); }
      to   { opacity: 1; transform: scale(1)   translateY(0);    }
    }

    .balloons {
      display: flex; justify-content: center; gap: 12px;
      margin-bottom: 20px; font-size: 2rem;
      animation: floatBalloons 3s ease-in-out infinite alternate;
    }
    @keyframes floatBalloons {
      from { transform: translateY(0); }
      to   { transform: translateY(-10px); }
    }

    h1 {
      font-family: 'Pacifico', cursive;
      font-size: clamp(2.2rem, 7vw, 3.4rem); line-height: 1.15;
      background: linear-gradient(90deg, #ffd700, #ff6eb4, #ffd700, #a78bfa);
      background-size: 300% auto;
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; animation: shimmer 3s linear infinite;
      margin-bottom: 8px; filter: drop-shadow(0 0 18px rgba(255,214,0,0.45));
    }
    @keyframes shimmer {
      0%   { background-position: 0%   center; }
      100% { background-position: 300% center; }
    }

    .subtitle {
      color: rgba(255,255,255,0.65); font-size: 1rem;
      letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 32px;
    }

    .photo-wrap { position: relative; display: inline-block; margin-bottom: 28px; }
    .photo-ring {
      position: absolute; inset: -8px; border-radius: 50%;
      background: conic-gradient(#ffd700, #ff6eb4, #a78bfa, #38bdf8, #ffd700);
      animation: spinRing 4s linear infinite; z-index: -1;
    }
    @keyframes spinRing { to { transform: rotate(360deg); } }
    .photo-ring::after {
      content: ''; position: absolute; inset: 5px;
      border-radius: 50%; background: #2a0550;
    }
    .photo-wrap img {
      width: 180px; height: 180px; border-radius: 50%;
      object-fit: cover; display: block; position: relative;
      z-index: 1; border: 4px solid #2a0550;
    }

    .party-row {
      font-size: 1.5rem; letter-spacing: 6px; margin-top: 4px;
      animation: floatBalloons 2.5s ease-in-out infinite alternate-reverse;
    }

    .bbq-btn {
      display: inline-block; margin-top: 28px; padding: 14px 28px;
      background: linear-gradient(135deg, #ff6a00, #ee0979);
      color: #fff; font-family: 'Nunito', sans-serif;
      font-size: 1rem; font-weight: 700; border-radius: 50px;
      text-decoration: none; letter-spacing: 0.05em;
      box-shadow: 0 4px 24px rgba(238,9,121,0.45);
      transition: transform 0.2s, box-shadow 0.2s;
      animation: pulse 2s ease-in-out infinite;
    }
    .bbq-btn:hover { transform: scale(1.07); box-shadow: 0 8px 32px rgba(255,106,0,0.6); }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 4px 24px rgba(238,9,121,0.45); }
      50%       { box-shadow: 0 4px 40px rgba(255,106,0,0.8);  }
    }

    /* ── Botão Música ── */
    #music-btn {
      display: flex; align-items: center; justify-content: center;
      margin: 20px auto 0 auto;
      width: 58px; height: 58px; border-radius: 50%; cursor: pointer;
      font-size: 1.6rem; background: rgba(255,255,255,0.13);
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      border: 1.5px solid rgba(255,255,255,0.28);
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
      transition: transform 0.2s, background 0.2s;
    }
    #music-btn:hover { transform: scale(1.12); background: rgba(255,255,255,0.22); }
    #music-btn.playing { animation: spinNote 3s linear infinite; }
    @keyframes spinNote {
      0%   { transform: rotate(0deg)   scale(1);   }
      50%  { transform: rotate(180deg) scale(1.1); }
      100% { transform: rotate(360deg) scale(1);   }
    }

    #music-tip {
      text-align: center; margin-top: 8px;
      color: rgba(255,255,255,0.55); font-size: 0.78rem; font-weight: 700;
      letter-spacing: 0.05em; min-height: 18px;
    }

    #yt-frame { position: fixed; top: -9999px; left: -9999px; width: 1px; height: 1px; }
  </style>
</head>
<body>

  <div class="stars"        id="stars"></div>
  <div class="confetti-wrap" id="confetti"></div>
  <div id="yt-frame"></div>

  <div id="yt-frame-unused"></div>
  <div class="card">
    <div class="balloons">🎈 🎉 🎈</div>
    <h1>Parabéns,<br>Douglas!</h1>
    <p class="subtitle">✨ Que este dia seja incrível ✨</p>

    <div class="photo-wrap">
      <div class="photo-ring"></div>
      <img src="images.jpg" alt="Foto do Douglas"
           onerror="this.src='https://placehold.co/180x180/7c3aed/ffd700?text=😄'" />
    </div>

    <div class="party-row">🎂 🥳 🎁</div>
    <a class="bbq-btn" href="churrasco.html">🔥 Clique aqui pra uma surpresa! 🍖</a>

    <button id="music-btn" title="Ligar/Desligar música">🎵</button>
    <p id="music-tip">🎵 Toca a música do Douglas!</p>
  </div>

  <script>
    /* Stars */
    const starsEl = document.getElementById('stars');
    for (let i = 0; i < 80; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      s.style.left = Math.random() * 100 + 'vw';
      s.style.top  = Math.random() * 100 + 'vh';
      s.style.animationDuration = (1.5 + Math.random() * 3) + 's';
      s.style.animationDelay    = (Math.random() * 4) + 's';
      s.style.width = s.style.height = (2 + Math.random() * 4) + 'px';
      starsEl.appendChild(s);
    }

    /* Confetti */
    const confettiEl = document.getElementById('confetti');
    const colors = ['#ffd700','#ff6eb4','#a78bfa','#38bdf8','#f97316','#34d399','#f43f5e'];
    for (let i = 0; i < 60; i++) {
      const c = document.createElement('div');
      c.className = 'confetti';
      c.style.left              = Math.random() * 100 + 'vw';
      c.style.top               = '-20px';
      c.style.background        = colors[Math.floor(Math.random() * colors.length)];
      c.style.animationDuration = (4 + Math.random() * 6) + 's';
      c.style.animationDelay    = (Math.random() * 8) + 's';
      c.style.width             = (8 + Math.random() * 8) + 'px';
      c.style.height            = (12 + Math.random() * 8) + 'px';
      c.style.borderRadius      = Math.random() > 0.5 ? '50%' : '2px';
      confettiEl.appendChild(c);
    }

    /* Música YouTube */
    const btn     = document.getElementById('music-btn');
    const tip     = document.getElementById('music-tip');
    const wrap    = document.getElementById('yt-frame');
    const VID     = '5A2it2DBEhM';
    let playing   = false;
    let iframe    = null;

    setTimeout(() => { tip.style.display = 'none'; }, 4500);

    btn.addEventListener('click', () => {
      if (!playing) {
        iframe = document.createElement('iframe');
        iframe.src = `https://www.youtube.com/embed/${VID}?autoplay=1&loop=1&playlist=${VID}&controls=0`;
        iframe.allow = 'autoplay';
        iframe.setAttribute('allowfullscreen', '');
        wrap.appendChild(iframe);
        btn.textContent = '🔇';
        btn.classList.add('playing');
        tip.textContent  = '🎶 MC Gorila tocando!';
        tip.style.display = 'block';
        setTimeout(() => { tip.style.display = 'none'; }, 3000);
        playing = true;
      } else {
        if (iframe) { wrap.removeChild(iframe); iframe = null; }
        btn.textContent = '🎵';
        btn.classList.remove('playing');
        playing = false;
      }
    });
  </script>
</body>
</html>
