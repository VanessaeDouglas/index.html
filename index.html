<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Parabéns Douglas!</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: radial-gradient(circle, #121212, #000);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        h1 {
            font-size: 3rem;
            text-align: center;
            text-transform: uppercase;
            text-shadow: 0 0 15px #ff00de, 0 0 30px #ff00de;
            animation: pulse 1.5s infinite alternate;
        }

        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.1); }
        }

        .moldura-neon {
            padding: 10px;
            background: linear-gradient(45deg, #ff00de, #fffb00, #00ffea);
            border-radius: 20px;
            box-shadow: 0 0 40px #ff00de;
            animation: girar-cores 3s linear infinite;
        }

        @keyframes girar-cores {
            0% { filter: hue-rotate(0deg); }
            100% { filter: hue-rotate(360deg); }
        }

        .moldura-neon img {
            display: block;
            width: 380px;
            border-radius: 15px;
        }

        .cargo {
            margin-top: 20px;
            color: #fffb00;
            font-weight: bold;
            font-size: 1.3rem;
        }
    </style>
</head>
<body>

    <h1>Parabéns Douglas!</h1>

    <div class="moldura-neon">
        <img src="images" alt="Estrela">
    </div>

    <p class="cargo">Analista Administrativo - Hospital Jayme Santos Neves</p>

</body>
</html>
